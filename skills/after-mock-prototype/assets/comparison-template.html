<!doctype html>
<html lang="en" data-prototype-comparison="1">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__COMPARISON_TITLE__</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #171717;
      background: #f4f4f5;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-width: 320px; min-height: 100vh; }
    button, select { font: inherit; }

    .review-header {
      position: sticky;
      z-index: 20;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 68px;
      padding: 12px 20px;
      border-bottom: 1px solid #dedee3;
      background: rgb(255 255 255 / 94%);
      backdrop-filter: blur(16px);
    }

    .review-title { min-width: 0; }
    .review-title h1 { margin: 0; font-size: 16px; line-height: 1.25; }
    .review-title p { margin: 3px 0 0; color: #71717a; font-size: 12px; }

    .review-controls { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .control { display: grid; gap: 3px; color: #71717a; font-size: 10px; font-weight: 650; letter-spacing: .04em; text-transform: uppercase; }
    .control select {
      min-width: 118px;
      height: 34px;
      padding: 0 30px 0 10px;
      border: 1px solid #d4d4d8;
      border-radius: 8px;
      color: #18181b;
      background: #fff;
    }

    .mobile-tabs { display: none; gap: 4px; padding: 10px 12px 0; }
    .mobile-tab {
      flex: 1;
      height: 36px;
      border: 1px solid #d4d4d8;
      border-radius: 8px;
      color: #52525b;
      background: #fff;
    }
    .mobile-tab.is-active { border-color: #18181b; color: #fff; background: #18181b; }

    .review-stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      align-items: start;
    }

    .prototype-panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid #d4d4d8;
      border-radius: 12px;
      background: #e4e4e7;
      box-shadow: 0 10px 30px rgb(24 24 27 / 8%);
    }

    .panel-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
      padding: 0 12px;
      border-bottom: 1px solid #d4d4d8;
      background: #fff;
    }
    .panel-label { font-size: 12px; font-weight: 750; letter-spacing: .05em; text-transform: uppercase; }
    .panel-size { color: #71717a; font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; }

    .viewport-area {
      display: flex;
      justify-content: center;
      min-height: 240px;
      padding: 16px;
      overflow: auto;
    }

    .viewport-shell {
      position: relative;
      flex: none;
      overflow: hidden;
      border-radius: 5px;
      background: #fff;
      box-shadow: 0 0 0 1px rgb(24 24 27 / 12%);
    }

    .viewport-canvas {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }

    .prototype-viewport { display: block; border: 0; background: #fff; }
    .review-error { margin: 40px auto; max-width: 720px; padding: 20px; color: #991b1b; white-space: pre-wrap; }

    @media (max-width: 840px) {
      .review-header { position: static; align-items: stretch; flex-direction: column; }
      .review-controls { justify-content: stretch; }
      .control { flex: 1 1 130px; }
      .control select { width: 100%; min-width: 0; }
      .mobile-tabs { display: flex; }
      .review-stage { grid-template-columns: minmax(0, 1fr); padding: 12px; }
      .prototype-panel { display: none; }
      .prototype-panel.is-active { display: block; }
    }
  </style>
</head>
<body>
  <header class="review-header">
    <div class="review-title">
      <h1 id="flow-name">Before / After</h1>
      <p id="flow-intent"></p>
    </div>
    <div id="review-controls" class="review-controls"></div>
  </header>

  <nav class="mobile-tabs" aria-label="Prototype version">
    <button class="mobile-tab is-active" type="button" data-page-tab="before">Before</button>
    <button class="mobile-tab" type="button" data-page-tab="after">After</button>
  </nav>

  <main class="review-stage">
    <section class="prototype-panel is-active" data-page-panel="before">
      <div class="panel-bar"><span class="panel-label">Before</span><span class="panel-size"></span></div>
      <div class="viewport-area"><div class="viewport-shell"><div class="viewport-canvas"><iframe class="prototype-viewport" title="Before prototype"></iframe></div></div></div>
    </section>
    <section class="prototype-panel" data-page-panel="after">
      <div class="panel-bar"><span class="panel-label">After</span><span class="panel-size"></span></div>
      <div class="viewport-area"><div class="viewport-shell"><div class="viewport-canvas"><iframe class="prototype-viewport" title="After prototype"></iframe></div></div></div>
    </section>
  </main>

  <script id="embedded-prototype-manifest" type="application/json">
__MANIFEST_JSON__
  </script>
  <script>
    const manifest = JSON.parse(
      document.getElementById("embedded-prototype-manifest").textContent
    );
    const protocol = manifest.protocol;
    const controlsRoot = document.getElementById("review-controls");
    const panels = [...document.querySelectorAll("[data-page-panel]")];
    const query = new URLSearchParams(window.location.search);
    const selections = {};

    document.getElementById("flow-name").textContent = manifest.flow.name;
    document.getElementById("flow-intent").textContent = manifest.flow.intent || "";

    function selectValue(name, values) {
      const requested = query.get(name);
      return values.includes(requested) ? requested : values[0];
    }

    function addControl(name, label, values, format) {
      if (!Array.isArray(values) || values.length === 0) return;
      const wrapper = document.createElement("label");
      wrapper.className = "control";
      wrapper.append(document.createTextNode(label));
      const select = document.createElement("select");
      select.dataset.parameter = name;
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = typeof value === "string" ? value : value.id;
        option.textContent = format(value);
        select.append(option);
      });
      selections[name] = selectValue(name, [...select.options].map((option) => option.value));
      select.value = selections[name];
      select.addEventListener("change", () => {
        selections[name] = select.value;
        updateReview();
      });
      wrapper.append(select);
      controlsRoot.append(wrapper);
    }

    addControl("scene", "Scene", protocol.scenes, (value) => value);
    addControl("theme", "Theme", protocol.themes, (value) => value);
    addControl("lang", "Language", protocol.langs, (value) => value);
    addControl("viewport", "Viewport", protocol.viewports, (value) => `${value.id} · ${value.width}×${value.height}`);

    function currentViewport() {
      return protocol.viewports.find((viewport) => viewport.id === selections.viewport) || protocol.viewports[0];
    }

    function prototypeUrl(page) {
      const url = new URL(manifest.files[page], window.location.href);
      const sharedParameters = new URLSearchParams();
      sharedParameters.set("scene", selections.scene);
      if (selections.theme) sharedParameters.set("theme", selections.theme);
      if (selections.lang) sharedParameters.set("lang", selections.lang);
      url.search = sharedParameters.toString();
      return url.href;
    }

    function sizePanel(panel, viewport) {
      const area = panel.querySelector(".viewport-area");
      const shell = panel.querySelector(".viewport-shell");
      const canvas = panel.querySelector(".viewport-canvas");
      const iframe = panel.querySelector(".prototype-viewport");
      const availableWidth = Math.max(1, area.clientWidth - 32);
      const scale = Math.min(1, availableWidth / viewport.width);

      iframe.style.width = `${viewport.width}px`;
      iframe.style.height = `${viewport.height}px`;
      canvas.style.width = `${viewport.width}px`;
      canvas.style.height = `${viewport.height}px`;
      canvas.style.transform = `scale(${scale})`;
      shell.style.width = `${Math.round(viewport.width * scale)}px`;
      shell.style.height = `${Math.round(viewport.height * scale)}px`;
      panel.querySelector(".panel-size").textContent = `${viewport.width} × ${viewport.height} @ ${Math.round(scale * 100)}%`;
    }

    function updateReview() {
      const viewport = currentViewport();
      panels.forEach((panel) => {
        const page = panel.dataset.pagePanel;
        const iframe = panel.querySelector(".prototype-viewport");
        const nextUrl = prototypeUrl(page);
        if (iframe.src !== nextUrl) iframe.src = nextUrl;
        sizePanel(panel, viewport);
      });

      const comparisonQuery = new URLSearchParams();
      Object.entries(selections).forEach(([key, value]) => value && comparisonQuery.set(key, value));
      history.replaceState(null, "", `${window.location.pathname}?${comparisonQuery}`);
    }

    document.querySelectorAll("[data-page-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        const page = button.dataset.pageTab;
        document.querySelectorAll("[data-page-tab]").forEach((item) => item.classList.toggle("is-active", item === button));
        panels.forEach((panel) => panel.classList.toggle("is-active", panel.dataset.pagePanel === page));
        requestAnimationFrame(updateReview);
      });
    });

    new ResizeObserver(() => {
      const viewport = currentViewport();
      panels.forEach((panel) => sizePanel(panel, viewport));
    }).observe(document.querySelector(".review-stage"));

    updateReview();
  </script>
</body>
</html>
